name: Deploy Linux Monitor

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t joshseki/linux-monitor:latest .

      - name: Push Docker Image
        run: |
          docker push joshseki/linux-monitor:latest



      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull joshseki/linux-monitor:latest

            sudo docker stop linux-dashboard || true
            sudo docker rm linux-dashboard || true

            sudo docker run -d \
              --name linux-dashboard \
              --restart unless-stopped \
              -p 5000:5000 \
              joshseki/linux-monitor:latest

            sudo systemctl restart nginx
